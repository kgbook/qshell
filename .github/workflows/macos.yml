name: macos

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'BUILD.md'
      - 'CHANGELOG.md'
    tags:
      - V**

jobs:
  macos:
    runs-on: macos-15-intel

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.4'
          modules: 'qtserialport'
          aqtversion: '==3.1.20'

      - name: Install prerequisites
        run: |
          ruby -e "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install)" < /dev/null 2> /dev/null
          brew install create-dmg coreutils cmake

      # 准备 macOS 图标
      - name: Prepare macOS Icon
        run: |
          if [ ! -f "src/resources/images/qshell.icns" ]; then
            echo "Creating ICNS icon from PNG..."
            cd scripts
            ./macos-create-icon.sh
            cd ..
          else
            echo "ICNS icon already exists"
          fi

      # 非 tag 推送：仅构建
      - name: Build Only
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          cmake -B build -S .
          cmake --build build

      # tag 推送：构建 + 打包
      - name: Build and Package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # 从 tag 名称提取版本号 (去掉 'V' 或 'v' 前缀)
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^[Vv]//')
          echo "Building version: ${VERSION}"
          
          # 构建
          cmake -B build -S . -DAPP_VERSION="${VERSION}"
          cmake --build build --config Release

          # 创建 DMG 包
          cd build
          cpack -G DragNDrop

      # 查找生成的 DMG 文件并设置环境变量
      - name: Find DMG Package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          DMG_FILE=$(find build -name "*.dmg" -type f | head -n 1)
          if [ -n "$DMG_FILE" ]; then
            echo "DMG_FILE=${DMG_FILE}" >> $GITHUB_ENV
            echo "Found DMG package: ${DMG_FILE}"
          else
            echo "No DMG file found!"
            exit 1
          fi

      # 上传 Release
      - name: Create Release and Upload
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.DMG_FILE }}
          draft: false
          prerelease: false
          generate_release_notes: true
